name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .
      - run: python -m unittest discover -s tests
      - run: python -m vance.runner --generate-tasks --task resolve --agent improved_slm --mode fallback
      - run: python evals/run_eval.py --agent improved_slm --tasks tasks/easy.jsonl --mode fallback
      - run: python -m compileall vance agents app evals
